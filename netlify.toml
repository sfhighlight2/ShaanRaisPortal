# Netlify configuration for legacy-canvas-hub (Vite SPA)
# ─────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "dist"

# ── SPA routing: send all paths to index.html so React Router handles them ───
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Cache-Control for Vite's content-hashed static assets ────────────────────
# These files have hashes in their names (e.g. vendor-react-CbEqllKM.js)
# so they're safe to cache for 1 year. Browsers will auto-bust on deploy.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML and root — never cache (always check for updates) ───────────────────
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Note: Brotli compression is enabled automatically by Netlify on all plans.
# No additional configuration is needed.
