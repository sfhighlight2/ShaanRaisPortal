##
# CI: Nightly full regression suite.
# Runs full cross-browser E2E, accessibility scans, and all unit tests.
# Scheduled at 2 AM UTC daily.
##
name: Nightly — Full Regression Suite

on:
  schedule:
    # 2:00 AM UTC daily
    - cron: "0 2 * * *"
  # Allow manual trigger from Actions UI
  workflow_dispatch:

jobs:
  unit-tests:
    name: "Unit / Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npm run test:coverage
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: dummy-anon-key

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 14

  e2e-chromium:
    name: "E2E — Chromium"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: Install Playwright (Chromium)
        run: npx playwright install chromium --with-deps

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Run Chromium E2E suite
        run: npx playwright test --project=chromium
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-chromium
          path: playwright-report/
          retention-days: 14

  e2e-firefox:
    name: "E2E — Firefox"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npx playwright install firefox --with-deps

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - run: npx playwright test --project=firefox
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-firefox
          path: playwright-report/
          retention-days: 14

  e2e-webkit:
    name: "E2E — WebKit (Safari)"
    runs-on: macos-latest
    timeout-minutes: 30
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npx playwright install webkit --with-deps

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - run: npx playwright test --project=webkit
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-webkit
          path: playwright-report/
          retention-days: 14

  accessibility:
    name: "Accessibility Audit (axe-core)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Run accessibility scans
        run: npm run test:e2e:a11y
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-a11y
          path: playwright-report/
          retention-days: 14

  mobile-e2e:
    name: "E2E — Mobile (iPhone Safari)"
    runs-on: macos-latest
    timeout-minutes: 20
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npx playwright install webkit --with-deps

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - run: npx playwright test --project=mobile-safari
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-mobile-safari
          path: playwright-report/
          retention-days: 14
